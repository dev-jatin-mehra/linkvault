# Prometheus configuration for LinkVault
global:
  scrape_interval: 15s # Scrape metrics every 15 seconds
  evaluation_interval: 15s # Evaluate rules every 15 seconds
  external_labels:
    monitor: "linkvault-monitor"

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Rules files
rule_files: []

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # LinkVault API server
  - job_name: "linkvault-api"
    static_configs:
      - targets: ["linkvault-backend-omega.vercel.app"]
    metrics_path: "/metrics"
    scrape_interval: 15s
    scrape_timeout: 10s
    scheme: "http"
